<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#060810">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>MarketWatch</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">MARKET<span>WATCH</span></div>
    <div class="hdr-right">
      <span id="last-updated"></span>
      <div id="clock"></div>
      <div class="live-badge">
        <div id="status-dot" class="live-dot"></div>
        <span id="status-text" class="live-txt">Live</span>
      </div>
      <div class="countdown-badge">
        <span class="countdown-label">Next</span>
        <span id="countdown">—</span>
      </div>
    </div>
  </header>

  <!-- Global Indices -->
  <section class="section">
    <div class="sec-hdr"><span class="sec-title">Global Indices</span></div>
    <div id="indices-grid" class="grid"></div>
  </section>

  <!-- Commodities -->
  <section class="section">
    <div class="sec-hdr"><span class="sec-title">Commodities</span></div>
    <div id="commodities-grid" class="grid"></div>
  </section>

  <!-- Forex -->
  <section class="section">
    <div class="sec-hdr"><span class="sec-title">Currency Pairs</span></div>
    <div id="forex-grid" class="forex-grid"></div>
  </section>

  <footer>
    <span>Personal dashboard · Twelve Data + Frankfurter API · Refreshes every 3.5 min</span>
    <span class="ftr-logo">tatsumoject</span>
  </footer>

</div>

<script src="data/config.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
