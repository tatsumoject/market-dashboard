<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="logo">MARKET<span>WATCH</span></div>
      <div class="header-right">
        <div id="clock" class="clock">--:--:--</div>
        <div class="status-badge">
          <div id="status-dot" class="status-dot loading"></div>
          <span id="status-text" class="status-text loading">Loading</span>
        </div>
        <button id="refresh-btn" class="refresh-btn">↻ Refresh</button>
      </div>
    </header>

    <div class="meta-bar">
      <span id="last-updated" class="meta-text">Fetching data...</span>
      <span id="next-refresh" class="meta-text"></span>
    </div>

    <section class="section">
      <div class="section-header">
        <span class="section-title">Global Indices</span>
        <span class="section-source">via Stooq</span>
      </div>
      <div id="indices-grid" class="cards-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <span class="section-title">Commodities</span>
        <span class="section-source">USD prices · via Stooq</span>
      </div>
      <div id="commodities-grid" class="cards-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <span class="section-title">Currency Pairs</span>
        <span class="section-source">via Frankfurter</span>
      </div>
      <div id="forex-grid" class="forex-grid"></div>
    </section>

    <footer>
      <span>Personal dashboard · Data may be delayed 15–20 min</span>
      <span>tatsumoject</span>
    </footer>

  </div>

  <script src="data/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
