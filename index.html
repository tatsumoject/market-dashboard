<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#060810">
  <title>MarketWatch</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <!-- ── Header ── -->
  <header>
    <div class="logo">MARKET<span>WATCH</span></div>
    <div class="hdr-right">
      <div id="clock"></div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-txt">Live</span>
      </div>
    </div>
  </header>

  <div class="meta">
    <span class="meta-txt">Real-time data via TradingView · Prices may be delayed 15 min</span>
  </div>

  <!-- Global Indices -->
  <section class="section">
    <div class="sec-hdr">
      <span class="sec-title">Global Indices</span>
    </div>
    <div id="indices-grid" class="grid"></div>
  </section>

  <!-- Commodities -->
  <section class="section">
    <div class="sec-hdr">
      <span class="sec-title">Commodities</span>
    </div>
    <div id="commodities-grid" class="grid"></div>
  </section>

  <!-- Forex -->
  <section class="section">
    <div class="sec-hdr">
      <span class="sec-title">Currency Pairs</span>
    </div>
    <div id="forex-grid" class="forex-grid"></div>
  </section>

  <!-- Footer -->
  <footer>
    <span>Personal dashboard · Data provided by TradingView</span>
    <span class="ftr-logo">tatsumoject</span>
  </footer>

</div>

<script src="data/config.js?v=2"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
